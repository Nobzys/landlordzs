# Supabase project configuration — LANDLORDZS
# https://supabase.com/docs/guides/cli/config

project_id = "landlordzs"

[api]
enabled     = true
port        = 54321
schemas     = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows    = 1000

[api.tls]
enabled = false

[db]
port          = 54322
shadow_port   = 54320
major_version = 15

[db.pooler]
enabled         = false
port            = 54329
pool_mode       = "transaction"
default_pool_size    = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"

[studio]
enabled  = true
port     = 54323
api_url  = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled    = true
port       = 54324
smtp_port  = 54325
pop3_port  = 54326

[storage]
enabled         = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

# GoTrue validates every `redirect_to` it's given (signup confirmation,
# password reset, etc.) against site_url + additional_redirect_urls. If the
# requested redirect isn't covered, it SILENTLY falls back to site_url with
# no error returned to the caller — emails still send, but the link in them
# drops any ?next=... path, breaking flows that need it (e.g. password
# reset's /api/auth/callback?next=/reset-password). The wildcard below must
# cover every path the app ever passes as redirectTo/emailRedirectTo.
#
# The hosted Supabase project has the equivalent setting under
# Authentication -> URL Configuration -> Redirect URLs in the dashboard —
# it is NOT controlled by this file and must be kept in sync manually.
[auth]
enabled                          = true
site_url                         = "http://127.0.0.1:3000"
additional_redirect_urls         = ["https://localhost:3000", "exp://127.0.0.1:8081", "http://127.0.0.1:3000/**"]
jwt_expiry                       = 3600
enable_refresh_token_rotation    = true
refresh_token_reuse_interval     = 10
enable_signup                    = true
enable_anonymous_sign_ins        = false
minimum_password_length          = 8
password_requirements            = "lower_upper_letters_digits"

[auth.email]
enable_signup         = true
double_confirm_changes = true
enable_confirmations  = true
secure_password_change = true
max_frequency         = "1s"
# Password reset / email OTP link expiry, in seconds. Phase 1 decision: 60 minutes.
otp_expiry             = 3600

# Custom confirmation template: links to our own /confirm page (token_hash +
# type) instead of Supabase's hosted auto-consuming verify endpoint. A bare
# GET to /confirm (what email-security link scanners issue) never consumes
# the token — only an explicit click does, via the confirmEmail server action.
[auth.email.template.confirmation]
subject      = "Confirm your LANDLORDZS account"
content_path = "./supabase/templates/confirmation.html"

[auth.sms]
enable_signup        = false
enable_confirmations = false
template             = "Your LANDLORDZS OTP code: {{ .Code }}"
max_frequency        = "5s"

[auth.external.google]
enabled      = false
client_id    = "env(AUTH_GOOGLE_CLIENT_ID)"
secret       = "env(AUTH_GOOGLE_SECRET)"
redirect_uri = ""

[edge_runtime]
enabled        = true
policy         = "oneshot"
inspector_port = 8083

[analytics]
enabled  = false
port     = 54327
backend  = "postgres"

[experimental]
orioledb_version = ""
s3_host          = "env(S3_HOST)"
s3_region        = "env(S3_REGION)"
s3_access_key    = "env(S3_ACCESS_KEY)"
s3_secret_key    = "env(S3_SECRET_KEY)"

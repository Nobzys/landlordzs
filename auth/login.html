<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — LANDLORDZS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
</head>
<body>
<div id="lz-header"></div>
<div id="lz-breadcrumb"></div>

<!-- PAGE CONTENT -->
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <a href="../index.html">LANDLORDZS</a>
    </div>

    <!-- Title -->
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to your account</p>

    <!-- Social Buttons -->
    <button type="button" class="social-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <button type="button" class="social-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.885v2.27h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
      </svg>
      Continue with Facebook
    </button>

    <div class="form-divider">or sign in with email</div>

    <!-- Login Form -->
    <form id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <div class="input-icon-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input id="login-email" type="email" class="form-control" placeholder="you@example.com" autocomplete="email" required/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">
          Password
          <a href="forgot-password.html" class="text-gray" style="font-weight:400; float:right; font-size:0.85rem;">Forgot password?</a>
        </label>
        <div class="input-icon-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input id="login-password" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required/>
          <button type="button" id="toggle-password" style="position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#888; padding:0.25rem;" aria-label="Show or hide password">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" id="remember-me"/>
          <span>Remember me on this device</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Sign In</button>

    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one free</a>
    </div>

  </div>
</div>

<div id="lz-footer"></div>
<button class="scroll-top" id="scrollTop" aria-label="Scroll to top">↑</button>
<script>
  window.LZ_BASE = '../';
  window.LZ_BREADCRUMB = [
    { label: 'Home', url: '../index.html' },
    { label: 'Sign In', url: null }
  ];
</script>
<script src="../assets/js/nav.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — LANDLORDZS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/main.css"/>
</head>
<body>
<div id="lz-header"></div>
<div id="lz-breadcrumb"></div>

<!-- PAGE CONTENT -->
<div class="auth-page">
  <div class="auth-card" style="max-width:420px;">

    <!-- Lock Icon -->
    <div class="text-center" style="font-size:3rem; line-height:1; margin-bottom:1.25rem;" aria-hidden="true">🔒</div>

    <!-- Title -->
    <h1 class="auth-title">Reset Your Password</h1>
    <p class="auth-sub">Enter your email address and we'll send you a link to reset your password.</p>

    <!-- Reset Form -->
    <form id="forgot-password-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="reset-email">Email Address</label>
        <div class="input-icon-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input id="reset-email" type="email" class="form-control" placeholder="you@example.com" autocomplete="email" required/>
        </div>
        <p class="form-hint">We'll send the reset link to this email address.</p>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Send Reset Link</button>

    </form>

    <div class="auth-footer">
      <a href="login.html" style="display:inline-flex; align-items:center; gap:0.4rem;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Sign In
      </a>
    </div>

  </div>
</div>

<div id="lz-footer"></div>
<button class="scroll-top" id="scrollTop" aria-label="Scroll to top">↑</button>
<script>
  window.LZ_BASE = '../';
  window.LZ_BREADCRUMB = [
    { label: 'Home', url: '../index.html' },
    { label: 'Reset Password', url: null }
  ];
</script>
<script src="../assets/js/nav.js"></script>
</body>
</html>
